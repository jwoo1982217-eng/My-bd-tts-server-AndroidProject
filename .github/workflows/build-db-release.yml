name: Build DB Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - fix-reader-cache-pcm-handoff

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build DB Release APK
        run: ./gradlew :app:assembleDbRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: db-release-apk
          path: app/build/outputs/apk/db/release/*.apk
